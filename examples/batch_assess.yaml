name: batch_assess
description: "演示 foreach 批量评估（多个 agent 并发评估候选并聚合）"
entry: finder

nodes:
  - name: finder
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    prompt: "找出候选结构，输出 JSON {candidates: [...]}"
    output_schema:
      type: object
      properties: {candidates: {type: array, items: {type: string}}}
      required: [candidates]
    routes:
      - to: assessor

  - name: assessor
    kind: foreach
    source: finder.output.candidates   # 运行时取数组
    item_var: candidate
    max_concurrent: 3
    body:
      kind: agent
      executor: opencode
      model: "deepseek/deepseek-v4-flash"
      prompt: "评估这个结构：{{ candidate }}"
    failure_mode: continue_on_error
    routes:
      - to: picker

  - name: picker
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    prompt: "从评估结果选最佳：{{ assessor.output.outputs }}"
    routes:
      - to: $end
