name: demo_task
description: |
  task 位置参数注入 demo（agent prompt 引用 {{ inputs.task }}）。
  运行：orca run examples/demo_task.yaml "测试任务"（task 注入 inputs.task）。
entry: worker
inputs:
  task:
    type: string
    description: "任务描述"
nodes:
  - name: worker
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    prompt: "任务：{{ inputs.task }}，回复 DONE"
    routes:
      - to: $end
outputs:
  reply: "{{ worker.output }}"
