# mxint_analysis —— 真实 bitx 量化分析 workflow（迁移自 AgentHarness mxint-analysis）
# 5 agent 链路：analyzer → configurator → runner → diagnostic_saver → report_painter
# 跑真 bitx（Session + 5 observers + StudyReport.save + diagnostic_pipeline），耗时 5-15 分钟。
# 验证 Orca 的 agent DAG 推进 + 结构化输出 schema + 工具白名单 + tape 持久化 +
# render_chart spawn-script 链路（report_painter 推真图表）。
#
# 跑：`tars run examples/mxint_analysis.yaml`
name: mxint_analysis
description: |
  迁移自 AgentHarness mxint-analysis 的端到端量化分析 workflow（真实 bitx 版）。
  5 个 agent 顺序推进：分析目标 PyTorch 项目 → 写 bitx adapter → 跑 MXInt8 量化分析 →
  跑 diagnostic pipeline → 推真图表（orca.chart.render_chart）+ 写学术风格 REPORT.md。
  目标项目用 sklearn digits + ConfigurableMLP（真实 PyTorch，~9K 参数），bitx 真跑
  量化误差分析（per-layer QSNR + bottleneck + recovery strategies）。
entry: analyzer

inputs:
  target_project:
    type: string
    description: "目标项目目录（相对 cwd；analyzer 在此目录下扫 *.py 找 model/data/weights）"
    default: "tests/e2e_mxint/target_project"
    required: false

nodes:
  # ── agent 1/5：分析目标项目 ─────────────────────────────────────────
  - name: analyzer
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: analyzer              # phase-14 显式引用 examples/agents/analyzer.md
    tools: [Bash, Read, Grep, Glob, TodoWrite]
    output_schema:
      type: object
      properties:
        model_class: {type: string, description: "nn.Module 类名"}
        model_module: {type: string, description: "相对项目根的 import 路径"}
        dataset: {type: string, description: "数据集名"}
        weights_path: {type: string, description: "权重文件绝对路径或 NOT_FOUND"}
        weights_exist: {type: boolean, description: "权重是否真实存在"}
        summary: {type: string, description: "一句话项目描述"}
      required: [model_class, model_module, dataset, weights_path, weights_exist, summary]
      additionalProperties: false
    routes:
      - to: configurator

  # ── agent 2/5：写 adapter + 拼 cli_command ──────────────────────────
  - name: configurator
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: configurator          # phase-14 显式引用 examples/agents/configurator.md
    tools: [Bash, Read, Write, Edit, Grep, Glob, TodoWrite]
    output_schema:
      type: object
      properties:
        adapter_path: {type: string, description: "adapter .py 绝对路径"}
        cli_command: {type: string, description: "完整可执行的 cli 命令"}
        device: {type: string, description: "由检测命令输出决定的 device 字符串"}
        summary: {type: string, description: "一句话配置摘要"}
      required: [adapter_path, cli_command, device, summary]
      additionalProperties: false
    routes:
      - to: runner

  # ── agent 3/5：跑诊断脚本，回收 output_dir + 精度/QSNR ─────────────
  - name: runner
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: runner                # phase-14 显式引用 examples/agents/runner.md
    tools: [Bash, Read, Write, Edit]
    output_schema:
      type: object
      properties:
        status: {type: string, enum: [success, error], description: "success/error"}
        output_dir: {type: string, description: "脚本实际写入的 output_dir"}
        fp32_accuracy: {type: number, description: "FP32 精度"}
        quant_accuracy: {type: number, description: "量化后精度"}
        accuracy_delta: {type: number, description: "quant - fp32"}
        worst_layer: {type: string, description: "最差层名"}
        worst_qsnr_db: {type: number, description: "最差层 QSNR (dB)"}
        summary: {type: string, description: "一句话结果摘要"}
      required: [status, output_dir, summary]
      additionalProperties: false
    routes:
      - when: "output.status == 'success'"
        to: diagnostic_saver
      - to: $end                       # runner 失败 → 直接收工（不继续下游）

  # ── agent 4/5：跑 diagnostic pipeline，落盘诊断 JSON ────────────────
  - name: diagnostic_saver
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: diagnostic_saver      # phase-14 显式引用 examples/agents/diagnostic_saver.md
    tools: [Bash]
    output_schema:
      type: object
      properties:
        diagnostic_dir: {type: string, description: "诊断目录绝对路径"}
        status: {type: string, enum: [success, error]}
        summary: {type: string, description: "一句话 pipeline 结果"}
      required: [diagnostic_dir, status, summary]
      additionalProperties: false
    routes:
      - when: "output.status == 'success'"
        to: report_painter
      - to: $end                       # diagnostic 失败 → 直接收工

  # ── agent 5/5：综合诊断数据 → 推真图表 + 写 REPORT.md（spawn-script render_chart）
  - name: report_painter
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: report_painter        # phase-14 显式引用 examples/agents/report_painter.md
    tools: [Bash, Read, Write]
    # 自由文本输出（无 output_schema）：报告 markdown 全文存进 output
    routes:
      - to: $end

outputs:
  final_status: "{{ runner.output.status }}"
  fp32_accuracy: "{{ runner.output.fp32_accuracy }}"
  quant_accuracy: "{{ runner.output.quant_accuracy }}"
  diagnostic_dir: "{{ diagnostic_saver.output.diagnostic_dir }}"
  report_preview: "{{ report_painter.output }}"
