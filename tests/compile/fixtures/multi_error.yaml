# 聚合：一处 YAML 多个独立错误，须一次报全（SPEC §6.4）
# ② entry 不存在(ghost_entry) + ④ route 引用 nowhere + ⑪ 兜底 route 不在最后
#   + ⑦ prompt 引用 nope —— 至少 4 个独立错误
name: multi_error
entry: ghost_entry
nodes:
  - name: a
    kind: agent
    prompt: "use {{ nope.output.x }}"
    routes:
      - to: nowhere                      # 无 when=兜底，但不是最后一条 → ⑪ 死代码 + ④ nowhere 不存在
      - when: "output.x == 1"
        to: $end
