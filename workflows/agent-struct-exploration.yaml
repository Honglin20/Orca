name: agent-struct-exploration
description: "LLM agent 驱动的模型结构搜索：迭代改写模型结构（AST 级）、实测时延与精度，循环逼近目标（降时延保精度）。不依赖超网，结构由 agent 直接改。契约见 docs/specs/agent-structural-exploration-design-draft.md。"

entry: family_detect

inputs:
  # ── inputs 标签约定（description 前缀，供 in-session 编排器/tars skill 读取）──
  #   [ask]      业务决策，用户意图未给则启动前集中询问（不单个问、不丢列表）
  #   [infer]    可自动推断（glob/探测），不问用户；推断失败才回退 [ask]
  #   [default]  有合理默认，不问；高级用户可直接覆盖
  #   [advanced] 罕见 override，不问；改它需懂内部
  # 工程内部常量（structural_slot_ratio / reject_hyperparam_only / paths / latency_provider /
  # gpus / model_family / onnx_opset / knowledge_base）已固化进 agent md / 脚本，不再作为 input 暴露。
  #
  # 用户决策面（[ask]+[infer]，编排器只处理这批）= model_path / train_command /
  # target_latency_ms / accuracy_target / max_rounds。
  # project_root / build_fn / dummy_input 已下沉给 family_detect 节点运行时探测输出
  # （它们是 model.py 内省任务，非用户决策）；pretrained_ckpt（死元信息）/ baseline_accuracy
  # （默认就测）已移除。

  model_path:
    type: string
    description: "[infer] 模型定义文件路径（只改它），如 examples/ViT/model.py。通常项目内仅一个 model.py，glob 即得；多候选回退 [ask]"
    required: true
  train_command:
    type: string
    description: "[ask] 训练命令原样 shell 执行（绝不改训练函数），如 'python train.py --epochs 30 --config base'。项目入口命令，必须用户确认"
    required: true
  test_command:
    type: string
    description: "[default] pre-trained 模式测试/eval 命令（load ckpt 测精度，不训练）。给定则 baseline 只测不训；为空则跑 train_command"
    required: false
    default: ""
  target_latency_ms:
    type: string
    description: "[ask] 目标时延(ms)；champion.latency ≤ 此值且精度达标即终止。核心业务 KPI，必须用户给"
    required: true
  accuracy_target:
    type: string
    description: "[ask] 精度下限；留空 = baseline−0.5%（微损）。无损则设为 baseline。留空走默认，但默认语义建议向用户确认一次（微损 vs 无损）"
    required: false
    default: ""
  max_rounds:
    type: string
    description: "[ask] 最大探索轮数（寻优预算，决定跑多久/烧多少卡）；耗尽即终止走 finalize。默认 20，用户可调"
    required: false
    default: "20"
  struct_scripts_dir:
    type: string
    description: "[default] 确定性辅助脚本目录（latency/export/ast_diff/ledger_reducer）。随 workflow 发布在 workflows/agents/_struct_scripts/；orca install 到 ~/.orca/workflows 时需覆盖为该绝对路径"
    required: false
    default: "workflows/agents/_struct_scripts"
  iterations:
    type: string
    description: "[advanced] Orca 单 run 节点访问数硬上限（循环兜底，由 orca resolve_max_iter 消费）。每轮约 7 次访问；默认 ≈ max_rounds×7 + 富余。超限 raise MaxIterationsError（fail loud）"
    required: false
    default: "500"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Setup（一次性）：LLM 判族 → 加载 KB 切片 → 建输出目录/账本/worktree
  #                  → 实测 baseline_latency（cost model，§5）→ seed champions.jsonl
  # ═══════════════════════════════════════════════════════════════
  - name: family_detect
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read, write, glob, grep]
    output_schema:
      type: object
      required: [output_dir, family, kb_cache_dir, project_root, build_fn, dummy_input]
      properties:
        output_dir: {type: string}
        family: {type: string, description: "命中的族名（可多族用 + 连，如 transformer+cnn）"}
        kb_cache_dir: {type: string}
        project_root: {type: string, description: "探测所得用户项目根绝对路径"}
        build_fn: {type: string, description: "探测所得实例化入口函数名（导出 ONNX 用）"}
        dummy_input: {type: string, description: "探测所得 dummy_input JSON 串，如 {\"shape\":[1,3,224,224],\"dtype\":\"float32\"}"}
    prompt: |
      你是结构性探索 workflow 的 **Setup（一次性·轻量）**：建输出目录 + **浅层族检测** + 加载 KB 切片
      + **探测 project_root / build_fn / dummy_input**（这三项原是用户 input，现下沉给你运行时内省 model.py 得到）。
      **不**做 ONNX 导出 / 测时延 / 训练（那些归下游 `baseline_measure` 节点，确定性脚本）。

      ## 输入
      - model_path: {{ inputs.model_path }}
      - model_family：恒 `auto`（由你浅层判族，已从 inputs 固化）
      - knowledge_base 根目录：`knowledge_base/`（已固化，不再作 input）

      ## 执行（确定性优先，fail loud）
      1. **建输出目录（append-only 账本，§6）**：`llm_artifacts/<model_name>/runs/<run_id>/`，子目录
         `snapshots/ champions.jsonl ledger.jsonl kb_cache/ viz/ .worktrees/`。`<run_id>` 用时间戳。
         `<model_name>` = model_path 文件名 stem。
      2. **探测 project_root**：从 model_path 所在目录向上走，取**第一个含 `train.py` 或 `pyproject.toml`
         或 `.git` 的目录**作为项目根（绝对路径）。走到 / 仍找不到 → 取 model_path 的 dirname，并在输出注明"低置信"。
      3. **探测 build_fn**：读 model.py **顶层** `def`，挑那个实例化并返回 `nn.Module` 的函数名
         （常见名 `build_model` / `create_model` / `<X>Builder` / `get_model`）。多个/不明确 → 取最像的并在输出注明"低置信"。
      4. **探测 dummy_input**：浅读 `forward()` 首参 + `__init__` 里出现的 shape 常量，推断导出 ONNX 用的输入。
         输出 **JSON 串**如 `{"shape":[1,3,224,224],"dtype":"float32"}`。无法可靠推断 → 按族给常见默认
         （transformer/cnn 视觉：`[1,3,224,224]`；无线接收信号：`[1,2,128]`）并注明"低置信"。**这是 downstream ONNX 导出的契约，错则 evaluator FAIL_export fail loud。**
      5. **浅层族检测（§7.3，关键：只看表面）**：
         - **只看 model.py 的最表面一层**：顶层 `import`、`nn.Module` 子类的**类名**、`__init__` 里**顶层**用到的模块类型
           （如 `nn.Conv1d` / `nn.MultiheadAttention` / 自定义 attention 类 / `nn.Linear` / RNN）。**只判整体方向**——
           例如"有 Conv + 自定义 attention → `cnn+transformer` 或 `wireless_receiver`"、"全 Conv → `cnn`"、"全 Linear+attention → `transformer`"。
           **严禁**：读深入实现、读 forward 细节、读 RAW 示例。可多族取并集（`transformer+cnn`）。
         - **不明确就按最接近的方向给一个最佳猜测**（不阻塞流程），并在输出注明"低置信"。族名优先用 KB 已注册的：
           `transformer` / `cnn` / `wireless_receiver` / `hybrid`。
         - **不用 AST 脚本判族**。
      6. **加载 KB 切片进 kb_cache/**（§7.3 run 级缓存）：按 `knowledge_base/index.json`
         的 `common.files` + 命中族的 `families.<族>.files`（**只 base 文件**：primitives / latency_moves / failures；
         directions/raw 由下游 hypothesizer/engineer 按各自 slice 自取），把所需 md **每文件只读一次**拷/缓存到 `kb_cache/`。

      ## 输出（**必须是合法 JSON 对象**，严格匹配上方 output_schema；orca 按 output_schema 校验，非 JSON → output_schema_mismatch fail loud）
      ```json
      {"output_dir": "<绝对路径>", "family": "<族名，可带低置信注>", "kb_cache_dir": "<kb_cache 绝对路径>",
       "project_root": "<绝对路径>", "build_fn": "<函数名>", "dummy_input": "<JSON 串>"}
      ```
    routes:
      - to: baseline_measure

  # baseline_measure（新·确定性）：导出 baseline ONNX + cost_model 测时延 + 取 baseline accuracy
  #（pre-trained → 只测不训 / 给定 / 训练）+ accuracy_target + seed champions。只跑脚本+解析，无 LLM 判断。
  - name: baseline_measure
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read]
    output_schema:
      type: object
      required: [output_dir, baseline_latency_ms, baseline_accuracy, accuracy_target]
      properties:
        output_dir: {type: string}
        baseline_latency_ms: {type: number, description: "cost model 实测（LLM 永不预测，§5）"}
        baseline_accuracy: {type: number}
        accuracy_target: {type: number}
        baseline_onnx: {type: string}
        accuracy_mode: {type: string, description: "train|test|given"}
    prompt: |
      你是 `baseline_measure` 节点（**确定性**）：调脚本测 baseline 时延 + 取 baseline accuracy + seed champions。
      **不做任何 LLM 判断**，只跑下面脚本 + 解析 stdout。

      ## 执行（fail loud；不要自己手写 torch/onnxruntime）
      ```bash
      python3 "{{ inputs.struct_scripts_dir }}/measure_baseline.py" \
        --output_dir "{{ family_detect.output.output_dir }}" \
        --model_path "{{ inputs.model_path }}" \
        --build_fn "{{ family_detect.output.build_fn }}" \
        --dummy_input '{{ family_detect.output.dummy_input }}' \
        --opset 17 \
        --latency_provider "workflows/agents/_struct_scripts/latency_onnxrt.py::measure" \
        --train_command "{{ inputs.train_command }}" \
        --test_command "{{ inputs.test_command }}" \
        --accuracy_target "{{ inputs.accuracy_target }}" \
        --project_root "{{ family_detect.output.project_root }}"
      ```
      从 stdout 的 `KEY: value` 解析：
      - `BASELINE_LATENCY_MS:` → baseline_latency_ms
      - `BASELINE_ACCURACY:` → baseline_accuracy
      - `ACCURACY_TARGET:` → accuracy_target
      - `ACCURACY_MODE:` → accuracy_mode（train | test | given）
      - `ONNX_PATH:` → baseline_onnx
      脚本非零退出 → **fail loud**（把 stderr 写进 fail_reason 并停）。

      ## 输出（**必须是合法 JSON 对象**，严格匹配上方 output_schema；非 JSON → fail loud）
      ```json
      {"output_dir": "{{ family_detect.output.output_dir }}", "baseline_latency_ms": <数>, "baseline_accuracy": <数>, "accuracy_target": <数>, "baseline_onnx": "<ONNX 绝对路径>", "accuracy_mode": "train|test|given"}
      ```
    routes:
      - to: hypothesizer

  # ═══════════════════════════════════════════════════════════════
  # 一轮（循环体）—— 循环回到 hypothesizer 由 viz_round 的 route 控制
  # ═══════════════════════════════════════════════════════════════

  # Step 1：Hypothesizer（LLM）—— 读 champion + KB 切片 + 时延缺口 → 提结构假设
  - name: hypothesizer
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: struct-hypothesizer
    output_schema:
      type: object
      required: [hypothesis_id, hypothesis, rationale_latency, rationale_novelty, structural_intent]
      properties:
        hypothesis_id: {type: string}
        hypothesis: {type: string, description: "宏观结构假设（改什么、为什么降时延）"}
        rationale_latency: {type: string}
        rationale_novelty: {type: string}
        structural_intent: {type: boolean, description: "是否为宏观结构方向（供 §9.2 配额计数）"}
    routes:
      - to: engineer

  # Step 2：Engineer（LLM）—— 假设 → 写入 worktree 的 model.py（AST/schema 可编译校验）
  - name: engineer
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: struct-engineer
    output_schema:
      type: object
      required: [candidate_id, worktree, snapshot_path]
      properties:
        candidate_id: {type: string}
        worktree: {type: string, description: "本 candidate 的 git worktree 绝对路径"}
        snapshot_path: {type: string, description: "snapshots/<id>_model.py 绝对路径（不可变快照）"}
        model_summary: {type: string}
    routes:
      - to: structure_gate

  # Step 3：结构门（§9）—— AST diff 出事实摘要（确定性）→ LLM 终判 tag（不驳回，只打标）
  - name: structure_gate
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read, write, glob, grep]
    output_schema:
      type: object
      required: [tag, diff_summary]
      properties:
        tag: {type: string, enum: [structural, hyperparam, mixed]}
        diff_summary: {type: string, description: "module-level AST diff 摘要（算子/拓扑是否变 / 哪些是纯数值改）"}
    prompt: |
      你是**结构变更门**（§9，放宽版 · 不硬驳回超参）。两步合一：确定性 AST 事实 + 语义终判。

      ## 输入
      - 父 model.py（champion 快照）+ 新 candidate 快照：从 `{{ family_detect.output.output_dir }}snapshots/`
        读，本轮 candidate = `{{ engineer.output.snapshot_path }}`，父由 `ledger.jsonl` 最近 SUCCESS/parent 定。
      - 候选 worktree：`{{ engineer.output.worktree }}`
      - struct_scripts_dir: `{{ inputs.struct_scripts_dir }}`

      ## 执行
      1. **AST diff（确定性事实，§9.1）**：跑 `python3 {{ inputs.struct_scripts_dir }}/ast_diff.py --parent <父 model.py> --child <子 model.py> --format json`。
         读 stdout JSON：`topology_changed` / `operator_changes` / `numeric_changes` / `added` / `removed` / `summary`。
         客观列出算子类型/拓扑是否变、哪些是纯数值改（如 hidden_dim、num_layers、lr）。把摘要作为**参考输入**。
         脚本失败（非零退出）→ 读 stderr，仍可在 prompt 内 inline python 跑 AST diff 兜底（不应阻塞主循环）。
      2. **LLM 终判 tag** ∈ {`structural`, `hyperparam`, `mixed`}（§9.1 / §14 决策3）：在 AST 摘要 grounding 下
         做语义判定（能处理 AST 判不出的边界，如 group conv groups 1→8 是数值改但语义算结构性）。
         **AST 不是唯一判据、也不直接驳回**；它是防自凑配额的事实参考。
      3. **不驳回**（§9.2 默认）：默认全部放行，tag 写输出（下游 curator 入账本）。

      ## 输出（**必须是合法 JSON 对象**，严格匹配上方 output_schema；非 JSON → fail loud）
      ```json
      {"tag": "structural|hyperparam|mixed", "diff_summary": "<AST 事实摘要>"}
      ```
    routes:
      - to: evaluator

  # Step 4：Evaluator（确定性）—— 导出 ONNX → cost_model.measure → 时延门 → 按需抢卡跑 train_command → 取 accuracy
  - name: evaluator
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: struct-evaluator
    output_schema:
      type: object
      required: [status, latency_ms, met_latency, accuracy, met_accuracy]
      properties:
        status: {type: string, enum: [SUCCESS, FAIL_latency, FAIL_accuracy, FAIL_export]}
        latency_ms: {type: number, description: "实测时延（cost model，不变量1）；FAIL_export 时为 -1"}
        met_latency: {type: boolean, description: "latency < champion.latency（时延门，§3/§4）"}
        accuracy: {type: number, description: "训练所得精度；未训练时为 -1"}
        met_accuracy: {type: boolean}
        onnx_path: {type: string}
        snapshot_path: {type: string}
        fail_reason: {type: string}
    routes:
      - to: analyst

  # Step 6（§3）：Analyst（LLM）—— 归因成败 → 提炼结构原则 → 写回 KB（成功 & 失败都记）
  - name: analyst
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: struct-analyst
    output_schema:
      type: object
      required: [attribution, principle]
      properties:
        attribution: {type: string, description: "本 candidate 成/败归因（时延降/升、精度保持/掉的宏观结构原因）"}
        principle: {type: string, description: "提炼的结构-性能原则（追加写 KB）"}
        kb_writeback: {type: string, description: "写回的目标文件（failures.md / principles.md）"}
    routes:
      - to: curator

  # Step 6-9（§3）：Curator（确定性 reducer）—— 账本 append / 结构门分类 / champion ratchet / explore-exploit 路由
  - name: curator
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    agent: struct-curator
    output_schema:
      type: object
      required: [round, continue_loop, champion_id, champion_latency_ms, champion_accuracy, route_mode]
      properties:
        round: {type: integer}
        continue_loop: {type: boolean, description: "true=未达标且未耗尽预算 → 继续循环；false=终止走 finalize"}
        champion_id: {type: string}
        champion_latency_ms: {type: number}
        champion_accuracy: {type: number}
        route_mode: {type: string, enum: [exploit, explore], description: "champion 改进→exploit；否则→explore（§3 step 8）"}
        terminate_reason: {type: string, description: "continue_loop=false 时的原因（champion_met / max_rounds / budget）"}
    routes:
      - to: viz_round

  # 刷新本轮可视化（orca.chart render_chart 推送；四图见 §12）
  - name: viz_round
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read, write, glob, grep]
    prompt: |
      你是结构性探索 workflow 的**轮内可视化**刷新（§12，orca.chart render_chart 推送，幂等刷新）。

      ## 输入（账本，只读）
      - ledger: `{{ family_detect.output.output_dir }}ledger.jsonl`（每行一个 candidate）
      - champions: `{{ family_detect.output.output_dir }}champions.jsonl`（冠军轨迹）
      - 本轮：`{{ curator.output.round }}` / champion `{{ curator.output.champion_id }}`
      - baseline: latency `{{ baseline_measure.output.baseline_latency_ms }}`ms / accuracy `{{ baseline_measure.output.baseline_accuracy }}`
      - 目标: latency `{{ inputs.target_latency_ms }}`ms / accuracy `{{ baseline_measure.output.accuracy_target }}`
      - struct_scripts_dir: `{{ inputs.struct_scripts_dir }}`

      ## 执行（确定性脚本，无 LLM / 无内联兜底）
      直接调 `viz_struct.py`（§12 四图全部由该脚本经 render_chart 推送到 Orca Web 面板）：
      ```bash
      python3 "{{ inputs.struct_scripts_dir }}/viz_struct.py" \
        --ledger "{{ family_detect.output.output_dir }}ledger.jsonl" \
        --champions "{{ family_detect.output.output_dir }}champions.jsonl" \
        --baseline_latency_ms "{{ baseline_measure.output.baseline_latency_ms }}" \
        --baseline_accuracy "{{ baseline_measure.output.baseline_accuracy }}" \
        --target_latency_ms "{{ inputs.target_latency_ms }}" \
        --accuracy_target "{{ baseline_measure.output.accuracy_target }}"
      ```
      从 stdout JSON 读 `charts`：每图 `pushed: true/false`。数据不足 → 该图由脚本自动跳过（stderr WARN），
      **不报错、不阻断主循环**。脚本异常（非零退出）→ 读 stderr 把关键行写进输出，仍 `|| true` 不阻断（viz 是 sidecar）。

      ## 输出
      ```
      VIZ_ROUND: ok
      CHARTS: <stdout JSON 的 charts 字段，或 stderr 摘要>
      ```
    routes:
      # 循环机制：DAG 内 back-route（条件 cycle）。continue_loop=true → 回 hypothesizer 开下一轮；
      # false → 出循环走 finalize。route 由 router 纯函数求值（确定性控制流，非 LLM 自驱）。
      - when: "curator.output.continue_loop"
        to: hypothesizer
      - to: finalize

  # ═══════════════════════════════════════════════════════════════
  # 收尾（一次性）：champion 从头重训 + 导出 ONNX + final_report（§14 决策5）
  # ═══════════════════════════════════════════════════════════════
  - name: finalize
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read, write, glob, grep]
    output_schema:
      type: object
      required: [final_model, final_onnx, final_latency_ms, final_accuracy, final_report]
      properties:
        final_model: {type: string, description: "champion model.py 快照绝对路径"}
        final_onnx: {type: string}
        final_latency_ms: {type: number}
        final_accuracy: {type: number}
        final_report: {type: string, description: "final_report.md 绝对路径"}
    prompt: |
      你是结构性探索 workflow 的 **收尾**（§14 决策5）：champion 从头重训 + 导出 ONNX + final_report。

      ## 输入
      - 账本/champion：`{{ family_detect.output.output_dir }}champions.jsonl`（最后一行 = 全局 champion）。
      - curator 终态：`{{ curator.output.champion_id }}` / `terminate_reason: {{ curator.output.terminate_reason }}`。
      - train_command（原样，绝不改）：`{{ inputs.train_command }}`
      - latency_provider（已固化）：`workflows/agents/_struct_scripts/latency_onnxrt.py::measure`
      - build_fn / dummy_input：`{{ family_detect.output.build_fn }}` / `{{ family_detect.output.dummy_input }}`（onnx_opset 已固化为 17）
      - struct_scripts_dir：`{{ inputs.struct_scripts_dir }}`

      ## 执行（fail loud）
      1. 从 `champions.jsonl` 最后一行取 champion snapshot 路径（`final_model`）。
      2. 把 champion model.py 置入干净 worktree → **原样跑 `train_command`**（按需 `nvidia-smi` 探测空闲卡设
         `CUDA_VISIBLE_DEVICES`，§8）从头重训（full epochs）→ 取 final_accuracy。
         训练失败 → fail loud（读日志写进输出，不假装完成）。
      3. 用确定性脚本导出 ONNX 并测时延（与 family_detect 一致）：
         ```bash
         python3 "{{ inputs.struct_scripts_dir }}/export_onnx.py" --model_path <final_model> \
           --build_fn "{{ family_detect.output.build_fn }}" --dummy_input '{{ family_detect.output.dummy_input }}' \
           --opset 17 --out <output_dir>/final.onnx
         ```
         再动态加载固化路径 `workflows/agents/_struct_scripts/latency_onnxrt.py::measure`
         （`module_path::func_name` 切开、`importlib.util.spec_from_file_location`）→
         调 `measure(final_onnx)` 得 `final_latency_ms`（不变量1，§5）。加载失败 fail loud。
      4. 写 `final_report.md`：baseline vs champion（latency/accuracy 降幅）、terminate_reason、探索轮数、
         结构图（从 ledger.jsonl 的 parent 链）、Pareto 摘要。

      ## 输出（**必须是合法 JSON 对象**，严格匹配上方 output_schema；非 JSON → fail loud）
      ```json
      {"final_model": "<绝对路径>", "final_onnx": "<绝对路径>", "final_latency_ms": <数>, "final_accuracy": <数>, "final_report": "<final_report.md 绝对路径>"}
      ```
    routes:
      - to: viz_finalize

  # 终态可视化（orca.chart render_chart 推送；四图终态版见 §12）
  - name: viz_finalize
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-flash"
    tools: [bash, read, write, glob, grep]
    prompt: |
      你是结构性探索 workflow 的**终态可视化**（§12 四图终态版 + 收尾对比，幂等刷新）。

      ## 输入
      - ledger: `{{ family_detect.output.output_dir }}ledger.jsonl`
      - champions: `{{ family_detect.output.output_dir }}champions.jsonl`
      - final: `{{ finalize.output.final_report }}` / latency `{{ finalize.output.final_latency_ms }}`ms / accuracy `{{ finalize.output.final_accuracy }}`
      - baseline: `{{ baseline_measure.output.baseline_latency_ms }}`ms / `{{ baseline_measure.output.baseline_accuracy }}`
      - 目标: `{{ inputs.target_latency_ms }}`ms / `{{ baseline_measure.output.accuracy_target }}`
      - 终止原因: `{{ curator.output.terminate_reason }}`
      - struct_scripts_dir: `{{ inputs.struct_scripts_dir }}`

      ## 执行（确定性脚本，无 LLM / 无内联兜底；全程 render_chart，不产 HTML）
      1. 调 `viz_struct.py` 重推 §12 四图终态版（与 viz_round 同命令；幂等刷新）：
         ```bash
         python3 "{{ inputs.struct_scripts_dir }}/viz_struct.py" \
           --ledger "{{ family_detect.output.output_dir }}ledger.jsonl" \
           --champions "{{ family_detect.output.output_dir }}champions.jsonl" \
           --baseline_latency_ms "{{ baseline_measure.output.baseline_latency_ms }}" \
           --baseline_accuracy "{{ baseline_measure.output.baseline_accuracy }}" \
           --target_latency_ms "{{ inputs.target_latency_ms }}" \
           --accuracy_target "{{ baseline_measure.output.accuracy_target }}"
         ```
         从 stdout JSON 读 `charts`。数据不足由脚本自动跳过（不报错）。脚本异常 `|| true` 不阻断。
      2. **额外**经 render_chart 推一张终态对比 bar（label=`struct-explore`, title=`Baseline vs Champion vs Final`）：
         三柱 baseline / champion / final 的 latency(ms)，accuracy 写进每行。
         champion latency/accuracy 取 champions.jsonl 最后一行；final 用
         `{{ finalize.output.final_latency_ms }}` / `{{ finalize.output.final_accuracy }}`；
         baseline 用 `{{ baseline_measure.output.baseline_latency_ms }}` / `{{ baseline_measure.output.baseline_accuracy }}`。
         ORCA_* env 沿链继承，直接内联 python 推（失败 `|| true` 不阻断）：
         ```bash
         python3 -c "from orca.chart import render_chart; render_chart(chart_type='bar', label='struct-explore', title='Baseline vs Champion vs Final', data=[{'stage':'baseline','latency_ms':<baseline_lat>,'accuracy':<baseline_acc>},{'stage':'champion','latency_ms':<champ_lat>,'accuracy':<champ_acc>},{'stage':'final','latency_ms':<final_lat>,'accuracy':<final_acc>}], x='stage', y='latency_ms', hue='stage')"
         ```
         （把 <...> 占位替换为真实数值；accuracy 缺失时省略该键。）

      ## 输出
      ```
      VIZ_FINALIZE: ok
      CHARTS: <stdout JSON 的 charts 字段 + 一张终态对比 bar 是否推成功>
      ```
    routes:
      - to: $end

outputs:
  result: "{{ finalize.output }}"
  champion: "{{ curator.output.champion_id }}"
  final_latency_ms: "{{ finalize.output.final_latency_ms }}"
  final_accuracy: "{{ finalize.output.final_accuracy }}"
  final_report: "{{ finalize.output.final_report }}"
  output_dir: "{{ family_detect.output.output_dir }}"
