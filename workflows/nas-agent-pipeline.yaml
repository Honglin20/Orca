name: nas-agent-pipeline
description: "端到端 NAS 自动化流水线（含可视化）：模型优化 → 超网生成 → [描述图] → 训练脚本 → 搜索脚本 → 训练/搜索执行(曲线刷新) → 架构评估 → [帕累托/漏斗图]"
entry: model_optimizer
inputs:
  model_path:
    type: string
    description: "用户 PyTorch 模型入口文件路径（如 examples/ViT_Imageclassfication/model.py）"
    required: true
  project_root:
    type: string
    description: "用户 PyTorch 项目根目录（如 examples/ViT_Imageclassfication/）"
    required: true
  output_dir:
    type: string
    description: "NAS 产物输出目录。留空则默认 llm_artifacts/<model_name>/"
    required: false
    default: ""

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Agent 1: 模型优化与超网生成
  # ═══════════════════════════════════════════════════════════════
  - name: model_optimizer
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: pytorch-model-optimizer
    routes:
      - to: viz_describe

  # ═══════════════════════════════════════════════════════════════
  # Agent 1.5: 可视化——基线模型表 + 超网/搜索空间表（C1/C2）
  # ═══════════════════════════════════════════════════════════════
  - name: viz_describe
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-viz
    routes:
      - to: train_script_gen

  # ═══════════════════════════════════════════════════════════════
  # Agent 2: 超网训练脚本生成
  # ═══════════════════════════════════════════════════════════════
  - name: train_script_gen
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: supernet-train-script
    routes:
      - to: search_pipeline_gen

  # ═══════════════════════════════════════════════════════════════
  # Agent 3: 搜索流水线脚本生成
  # ═══════════════════════════════════════════════════════════════
  - name: search_pipeline_gen
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-search-pipeline
    routes:
      - to: train_runner

  # ═══════════════════════════════════════════════════════════════
  # Agent 4: 训练与搜索执行（含训练/搜索/帕累托曲线实时刷新）
  # ═══════════════════════════════════════════════════════════════
  - name: train_runner
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-train-runner
    routes:
      - to: evaluator

  # ═══════════════════════════════════════════════════════════════
  # Agent 5: 架构评估与最终脚本生成
  # ═══════════════════════════════════════════════════════════════
  - name: evaluator
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    tools:
      - bash
      - read
      - write
      - edit
      - glob
      - grep
      - task
      - todowrite
    prompt: |
      你是 NAS 流水线的第五步：**架构评估与后处理**。

      ## 输入
      - 上一步的输出:
        {{ train_runner.output }}
      从中提取 `<output_dir>`。

      ## 执行

      1. 进入输出目录，读取 `AGENTS.md`（这是之前生成的 AI 指导文件）:
         ```bash
         cd <output_dir>
         ```

      2. 按照 `AGENTS.md` 中的指导完成以下任务:
         a. 从搜索结果的 Pareto 前沿中选择最优架构
         b. 为选中的架构生成重训练（retrain）或微调（finetune）脚本
         c. 确保生成的脚本可以直接执行以获得最终模型权重

      3. 使用 `nas-select-architecture` CLI 工具（如果 AGENTS.md 中有指导）或直接分析搜索日志 `runs/search/search.jsonl` 进行架构选择。
         **务必**让 `nas-select-architecture` 落盘 `selection_summary.json`（指定 `--arch_output_dir`，默认 `runs/retrain/selected/`），并把该路径写入输出——下游可视化（帕累托 selected 高亮 / 选择漏斗）依赖它。

      4. 生成以下产物:
         - `selected_architectures.json` — 选中的架构配置
         - `retrain.sh` / `finetune.sh` — 最终训练启动脚本
         - `final_report.md` — NAS 流水线总结报告

      ## 输出
      完成后输出最终摘要：
      ```
      OUTPUT_DIR: <输出目录路径>
      SELECTED_ARCHITECTURES: <选中架构数量>
      SELECTION_SUMMARY: <selection_summary.json 绝对路径>
      FINAL_SCRIPTS: <生成的最终脚本列表>
      PIPELINE_STATUS: <所有步骤完成状态>
      ```
    routes:
      - to: viz_finalize

  # ═══════════════════════════════════════════════════════════════
  # Agent 5.5: 可视化——终态帕累托前沿（自算全局前沿 + selected 高亮）+ 选择漏斗（C5/C6）
  # ═══════════════════════════════════════════════════════════════
  - name: viz_finalize
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-viz
    routes:
      - to: $end

outputs:
  result: "{{ evaluator.output }}"
