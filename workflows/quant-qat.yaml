name: quant-qat
description: "对 PyTorch 模型做量化感知训练（QAT）+ CAGE 后校正：输入 FP 模型+训练/校准数据，对比 rtn / duquantpp 两种训练态 fake-quant 方案，fake-quant 后短训恢复精度（teacher-student distillation-style QAT，可选 CAGE 后校正 W←W−lr·λ·(W−Q(W))），输出每方案训练前/后精度恢复 + 收敛曲线 + bake 最佳 q_model。与 quant-ptq-sweep（训练后量化）互补。底层调 ts_quant.prepare_trainable_fakequant_model + prepare_trainable_qat。"
entry: qat_trainer

inputs:
  model_path:
    type: string
    description: "[default] 用户 PyTorch 模型入口文件路径（可实例化 FP 模型，如 model.py）"
    required: true
  project_root:
    type: string
    description: "[default] 用户 PyTorch 项目根目录"
    required: true
  calib_data_ref:
    type: string
    description: "[infer] 校准数据 loader 的 dotted-path（duquantpp scheme 校准用）。agent 读用户代码找 loader；scheme=duquantpp 时找不到 fail loud（绝不造假）。会被内化进生成的 adapter.py"
    required: false
    default: ""
  train_data_ref:
    type: string
    description: "[infer] 训练数据 loader 的 dotted-path。agent 读用户代码找 loader；找不到 fail loud（绝不造假；QAT 没真实训练数据 = 烧算力跑无意义短训）。会被内化进 adapter.py"
    required: false
    default: ""
  eval_data_ref:
    type: string
    description: "[infer] 评估数据 loader 的 dotted-path。agent 读用户代码找 loader；找不到 fail loud（绝不「复用 train 当 eval」——train=eval 是数据泄漏口径，会让 best_scheme 选 overfit 候选）。会被内化进 adapter.py"
    required: false
    default: ""
  eval_fn_ref:
    type: string
    description: "[infer] 业务评估函数的 dotted-path；未提供则脚本 stderr 打 WARN：用 teacher-student mse，**精度仅自洽性参考**（训练 loss 始终用 teacher-student mse，label-free distillation-style QAT）。会被内化进 adapter.py"
    required: false
    default: ""
  scheme:
    type: string
    description: "[default] 训练态 fake-quant 方案对比集：rtn / duquantpp / both（both=对比两方案）"
    required: false
    default: "both"
  bit_width:
    type: string
    description: "[default] QAT fake-quant 位宽预设：w4a4-mx / w4a8-mx / w8a8-mx / w8a8-int / w4a16（QAT 默认 w8a8-mx，高位宽起步更稳）"
    required: false
    default: "w8a8-mx"
  cage:
    type: string
    description: "[default] CAGE 后校正开关：auto（按 total_steps 自决，通常开）/ true / false"
    required: false
    default: "auto"
  total_steps:
    type: string
    description: "[default] QAT 训练步数（int 字符串）。64=smoke，真实 QAT 视数据集调大"
    required: false
    default: "64"
  lr:
    type: string
    description: "[default] Adam 学习率（float 字符串）"
    required: false
    default: "1e-4"
  output_dir:
    type: string
    description: "[default] 产物输出目录。留空则默认 llm_artifacts/<model_name>/qat/"
    required: false
    default: ""
  target_hardware:
    type: string
    description: "[ask] 目标硬件：cuda / npu / cpu。空→脚本 resolve_device 自动探测（cuda 优先，npu 次之，cpu 兜底）"
    required: false
    default: ""
  seed:
    type: string
    description: "[default] 随机种子（贯穿 torch / numpy / random，复现性底座）"
    required: false
    default: "0"
  bake:
    type: string
    description: "[default] 是否 bake 最佳 q_model state_dict 到 best_qat_model.pt（'true'/'false'）"
    required: false
    default: "true"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # 单 agent：生成 adapter.py（适配异构模型 + train/eval loader + eval_fn）
  # → 调 run_qat.py（ts_quant.prepare_trainable_fakequant_model 双方案 +
  # prepare_trainable_qat + CAGE + render_chart 可视化 + bake 最佳）→ 回显 JSON 摘要。
  # ═══════════════════════════════════════════════════════════════
  - name: qat_trainer
    kind: agent
    executor: claude
    agent: qat-trainer
    output_schema:
      type: object
      required: [output_dir, report_path, model_path, best_scheme, best_metric, best_metric_before, recovery, schemes_evaluated, total_steps, cage, metric_kind]
      properties:
        output_dir: {type: string}
        report_path: {type: string}
        model_path: {type: string}
        baked_model_path: {type: string, description: "bake 出的最佳 q_model 路径（best_qat_model.pt）；bake=false 或失败时为空串"}
        best_scheme: {type: string}
        best_metric: {type: number}
        best_metric_before: {type: number}
        recovery: {type: number}
        schemes_evaluated:
          type: array
          items: {type: string}
        total_steps: {type: integer, minimum: 0}
        cage: {type: string}
        metric_kind: {type: string}
      additionalProperties: false
    routes:
      - to: $end

outputs:
  output_dir: "{{ qat_trainer.output.output_dir }}"
  report_path: "{{ qat_trainer.output.report_path }}"
  model_path: "{{ qat_trainer.output.model_path }}"
  baked_model_path: "{{ qat_trainer.output.baked_model_path }}"
  best_scheme: "{{ qat_trainer.output.best_scheme }}"
  best_metric: "{{ qat_trainer.output.best_metric }}"
  best_metric_before: "{{ qat_trainer.output.best_metric_before }}"
  recovery: "{{ qat_trainer.output.recovery }}"
  schemes_evaluated: "{{ qat_trainer.output.schemes_evaluated }}"
  total_steps: "{{ qat_trainer.output.total_steps }}"
  cage: "{{ qat_trainer.output.cage }}"
  metric_kind: "{{ qat_trainer.output.metric_kind }}"
