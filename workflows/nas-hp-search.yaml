name: nas-hp-search
description: "基于 Elastic 超网的轻量超参搜索（slim）：只搜宽度/深度等超参、不改 block 组件，跳过 LLM 评估，脚本化选架构。"
entry: model_optimizer

inputs:
  model_path:
    type: string
    description: "用户 PyTorch 模型入口文件路径（如 demo_target/model.py）"
    required: true
  project_root:
    type: string
    description: "用户 PyTorch 项目根目录（如 demo_target/）"
    required: true
  output_dir:
    type: string
    description: "NAS 产物输出目录。留空则默认 llm_artifacts/<model_name>/"
    required: false
    default: ""

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Agent 1: slim Elastic 超网生成（不展平 / 不读 optimize_rules）
  # 节点名 `model_optimizer` 是下游复用 agent（supernet-train-script）
  # 的硬契约：其 agent.md body 引用 {{ model_optimizer.output }}，
  # 经 Jinja2 StrictUndefined 渲染——故此处节点名须与之一致。
  # agent 指向新 slim folder-agent `elastic_optimizer`。
  # ═══════════════════════════════════════════════════════════════
  - name: model_optimizer
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: elastic_optimizer
    routes:
      - to: train_script_gen

  # ═══════════════════════════════════════════════════════════════
  # Agent 2: 超网训练脚本生成（复用 supernet-train-script；checklist 加 chart-inline）
  # 生成的 train_supernet.py 内联 _push_chart()——训练图 live 流，不需 tail/独立 viz 节点。
  # ═══════════════════════════════════════════════════════════════
  - name: train_script_gen
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: supernet-train-script
    routes:
      - to: search_pipeline_gen

  # ═══════════════════════════════════════════════════════════════
  # Agent 3: 搜索流水线脚本生成（复用 nas-search-pipeline，不改）
  # ═══════════════════════════════════════════════════════════════
  - name: search_pipeline_gen
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-search-pipeline
    routes:
      - to: runner

  # ═══════════════════════════════════════════════════════════════
  # Agent 4: 训练与搜索执行（复用 nas-train-runner）
  # 训练图由 train_supernet.py 内联 live 推；搜索图由 tail_metrics --mode search 推。
  # ═══════════════════════════════════════════════════════════════
  - name: runner
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-train-runner
    # 硬强制（防假执行）：runner 末尾用 python 从真 search.jsonl 计数输出 JSON。
    # 散文复述/没真跑搜索(records=0) → output_schema_mismatch → node_failed（确定性）。
    # search_records 来自真文件计数，伪造不出；手伪造正数则由下游 select 脚本读真文件失败兜底。
    output_schema:
      type: object
      required: [output_dir, search_done, search_records, search_log]
      properties:
        output_dir: {type: string}
        search_done: {type: boolean}
        search_records: {type: integer, minimum: 1}
        search_log: {type: string}
      additionalProperties: false
    routes:
      - to: select

  # ═══════════════════════════════════════════════════════════════
  # Agent 5: 脚本化架构选择（新 nas-select，替代 LLM evaluator）
  # nas-select-architecture + 模板填空 final_report.md + 推 C5/C6（无 LLM）。
  # ═══════════════════════════════════════════════════════════════
  - name: select
    kind: agent
    executor: opencode
    model: "deepseek/deepseek-v4-pro"
    agent: nas-select
    routes:
      - to: $end

outputs:
  result: "{{ select.output }}"
