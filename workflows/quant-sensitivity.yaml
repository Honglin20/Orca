name: quant-sensitivity
description: "对 PyTorch 模型做低精度敏感层分析：输入 FP 模型+校准数据，四选一方法（mse/layer_stats/ptq_binary_sensitivity/mix_precision_search）输出敏感层排名与可视化，供下游 PTQ/混精决策。底层调 ts_quant.analyze_low_precision_sensitive_layers。"
entry: sensitivity_analyzer

inputs:
  model_path:
    type: string
    description: "用户 PyTorch 模型入口文件路径（可实例化 FP 模型，如 model.py）"
    required: true
  project_root:
    type: string
    description: "用户 PyTorch 项目根目录"
    required: true
  calib_data_ref:
    type: string
    description: "[advanced] 校准数据 loader 的 dotted-path（如 myproj.data:load_calib），返回 torch DataLoader；留空则 agent 用少量假随机数据。会被内化进生成的 adapter.py"
    required: false
    default: ""
  method:
    type: string
    description: "[default] 敏感层分析方法，四选一：mse / layer_stats / ptq_binary_sensitivity / mix_precision_search"
    required: false
    default: "mse"
  ratio:
    type: string
    description: "[default] 敏感层选取比例（0~1 浮点字符串，如 0.1 表示 top 10%）"
    required: false
    default: "0.1"
  low_bits:
    type: string
    description: "[default] 低精度预设：w4a4-mx / int4 / w4a16"
    required: false
    default: "w4a4-mx"
  high_bits:
    type: string
    description: "[advanced] 高精度预设（method 为 ptq_binary_sensitivity/mix_precision_search 时的 high_precision_qconfig）：w8a8"
    required: false
    default: "w8a8"
  eval_fn_ref:
    type: string
    description: "[advanced] 业务评估函数的 dotted-path（如 myproj.eval:build_eval_fn）；method 为 ptq_binary_sensitivity/mix_precision_search 时必填。会被内化进生成的 adapter.py"
    required: false
    default: ""
  output_dir:
    type: string
    description: "[default] 产物输出目录。留空则默认 llm_artifacts/<model_name>/"
    required: false
    default: ""

nodes:
  # ═══════════════════════════════════════════════════════════════
  # 单 agent：生成 adapter.py（适配异构模型）→ 调 run_sensitivity.py
  # （ts_quant.analyze_low_precision_sensitive_layers + render_chart 可视化）
  # → 回显 JSON 摘要。无需独立 env 节点（ts_quant 是 orca 依赖，运行环境已含）。
  # ═══════════════════════════════════════════════════════════════
  - name: sensitivity_analyzer
    kind: agent
    executor: claude
    agent: sensitivity-analyzer
    output_schema:
      type: object
      required: [output_dir, report_path, sensitive_layers, selected_count, method]
      properties:
        output_dir: {type: string}
        report_path: {type: string}
        sensitive_layers:
          type: array
          items: {type: string}
        selected_count: {type: integer, minimum: 0}
        method: {type: string}
      additionalProperties: false
    routes:
      - to: $end

outputs:
  sensitive_layers: "{{ sensitivity_analyzer.output.sensitive_layers }}"
  report_path: "{{ sensitivity_analyzer.output.report_path }}"
  output_dir: "{{ sensitivity_analyzer.output.output_dir }}"
