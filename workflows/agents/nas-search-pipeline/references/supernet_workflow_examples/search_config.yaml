# Generated supernet import path. The fixed search runner imports this
# module to construct SearchSpace and candidate supernets.
search_space: "supernet.SearchSpace"

# Generated architecture codec
arch_codec: "arch_codec.ArchCodec"

# Generated worker-side sub-network evaluator
evaluator: "evaluator.CandidateEvaluator"

# Generated latency estimator. Measures latency on-the-fly using PyTorch directly.
latency_estimator: "latency_estimator.LatencyEstimator"

# Latency measurement settings consumed by the generated LatencyEstimator.
latency_cfg:
  warmup: 10
  repetitions: 50
  batch_size: 1                   # Batch size for the dummy input during measurement.

# Optional latency upper bound in milliseconds (ms).
# Set to a number (e.g., 10.0) to reject over-latency candidates by assigning worst fitness without quality evaluation.
# Set to null to disable the latency constraint.
latency_constraint: null

# Objective names in the exact order optimized by EvoX Algorithm.
# All objectives are smaller-is-better. The evaluator must return all keys
# listed here except the special "latency" key, which is supplied by the
# latency estimator.
objs:
  - "acc"
  - "latency"

# Search log. SearchLogger writes a human-readable .log here and a
# structured .jsonl (same stem) consumed later by select_architecture.
search_log_path: "./runs/search/search.log"

# Default scheduling dynamically detects visible GPUs/NPUs. Restrict devices
# with the runtime's visible-device environment variable, such as
# CUDA_VISIBLE_DEVICES or the NPU equivalent.
# This starts one worker process per visible device when concurrency=1.
# Each worker evaluates a single candidate model at a time on its assigned device.
concurrency: 1

# NSGA-II search schedule.
population_size: 32
num_generations: 20

# Project-specific evaluator settings copied from generated `<output_dir>/train_supernet.py`
# and, only if needed, user project files.
evaluator_cfg:
  # Supernet checkpoint from generated `<output_dir>/train_supernet.py`.
  # The evaluator uses this for validate/finetune.
  supernet_ckpt_path: "./runs/train/supernet_best.pth"
  data_dir: "<dataset_root>"
  batch_size: 128
  num_workers: 8
  amp: true
  
  # The following fields are examples of additional parameters needed when
  # the evaluation paradigm is 'finetune' or 'train_from_scratch':
  # lr: 0.001
  # weight_decay: 0.0
  # epochs: 1
